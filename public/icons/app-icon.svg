<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141820" />
      <stop offset="100%" stop-color="#0f1115" />
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#6fb1ff" stop-opacity="0.14" />
      <stop offset="100%" stop-color="#6fb1ff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="letter" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="45%" stop-color="#eef1f5" />
      <stop offset="100%" stop-color="#b8c4d4" />
    </linearGradient>
    <linearGradient id="glassEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="35%" stop-color="#d8ecff" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#6fb1ff" stop-opacity="0.35" />
    </linearGradient>
    <linearGradient id="glassShine" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.75" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)" />
  <rect width="512" height="512" fill="url(#bgGlow)" />

  <!-- Liquid-glass E -->
  <g transform="translate(256 268)" filter="url(#softGlow)">
    <text
      x="0"
      y="0"
      text-anchor="middle"
      dominant-baseline="central"
      font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif"
      font-size="292"
      font-weight="700"
      fill="none"
      stroke="url(#glassEdge)"
      stroke-width="14"
      stroke-linejoin="round"
    >E</text>
    <text
      x="0"
      y="0"
      text-anchor="middle"
      dominant-baseline="central"
      font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif"
      font-size="292"
      font-weight="700"
      fill="url(#letter)"
      stroke="#ffffff"
      stroke-opacity="0.22"
      stroke-width="3"
    >E</text>
    <text
      x="0"
      y="-18"
      text-anchor="middle"
      dominant-baseline="central"
      font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif"
      font-size="292"
      font-weight="700"
      fill="url(#glassShine)"
      fill-opacity="0.35"
      aria-hidden="true"
    >E</text>
  </g>
</svg>
