name: Deploy dev preview

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: expense-tracker-deploy-dev-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_ACCOUNT_ID: '800abdfb2ec1687266f66fd349c41d6a'

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use HTTPS for git-based npm dependencies
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run verify

      - name: Deploy preview (branch dev)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy:dev
