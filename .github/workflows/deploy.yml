name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: expense-tracker-deploy
  cancel-in-progress: true

env:
  CLOUDFLARE_ACCOUNT_ID: '800abdfb2ec1687266f66fd349c41d6a'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: RoyCrivolotti/site-ui
          ref: v1.0.2
          path: site-ui
          token: ${{ secrets.FINANCIAL_REVIEW_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: rm -f package-lock.json && npm install --no-workspaces
      - run: npm run verify

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: RoyCrivolotti/site-ui
          ref: v1.0.2
          path: site-ui
          token: ${{ secrets.FINANCIAL_REVIEW_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: rm -f package-lock.json && npm install --no-workspaces

      - name: Sync access env (owner + approve secret)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}
          ACCESS_APPROVE_SECRET: ${{ secrets.ACCESS_APPROVE_SECRET }}
          APP_ORIGIN: https://expenses.crivolotti.com
        run: npm run sync:access-env

      - name: Bootstrap allowed users in D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          ALLOWED_EMAILS: ${{ secrets.ALLOWED_EMAILS }}
        run: npm run bootstrap:allowed-users

      - name: Deploy expense-tracker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy

      - name: Deploy backup cron worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy:backup-cron
