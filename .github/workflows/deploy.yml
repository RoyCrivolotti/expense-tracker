name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: expense-tracker-deploy
  cancel-in-progress: true

env:
  CLOUDFLARE_ACCOUNT_ID: '800abdfb2ec1687266f66fd349c41d6a'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: RoyCrivolotti/site-ui
          ref: v1.0.1
          path: site-ui
          token: ${{ secrets.FINANCIAL_REVIEW_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm install
      - run: npm run verify

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: RoyCrivolotti/site-ui
          ref: v1.0.1
          path: site-ui
          token: ${{ secrets.FINANCIAL_REVIEW_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm install

      - name: Sync allowed users (Access + ALLOWED_EMAILS)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ALLOWED_EMAILS: ${{ secrets.ALLOWED_EMAILS }}
        run: node scripts/sync-allowed-users.mjs

      - name: Deploy expense-tracker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy
